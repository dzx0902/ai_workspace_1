services:
  chroma:
    image: chromadb/chroma:latest
    container_name: ai_chroma
    ports:
      - "8000:8000"
    volumes:
      - /mnt/f/AIWorkspace/kb/chroma-data:/data
    restart: unless-stopped

  paper_radar:
    build:
      context: ${PAPER_RADAR_AGENT_PATH:-../paper_radar_agent}
    image: paper-radar-agent
    container_name: ai_paper_radar
    ports:
      - "8010:8010"
    volumes:
      - paper_radar_data:/app/data
      - paper_radar_notes:/app/notes
      - /mnt/f/ObsidianVault/AI/PaperRadar:/mnt/f/ObsidianVault/AI/PaperRadar
    environment:
      - PAPER_RADAR_TIMEZONE=Asia/Shanghai
      - PAPER_RADAR_LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL}
    restart: unless-stopped

  paper_radar_scheduler:
    build:
      context: ${PAPER_RADAR_AGENT_PATH:-../paper_radar_agent}
    image: paper-radar-agent
    container_name: ai_paper_radar_scheduler
    command: python scripts/scheduler.py
    volumes:
      - paper_radar_data:/app/data
      - paper_radar_notes:/app/notes
      - /mnt/f/ObsidianVault/AI/PaperRadar:/mnt/f/ObsidianVault/AI/PaperRadar
    environment:
      - PAPER_RADAR_TIMEZONE=Asia/Shanghai
      - PAPER_RADAR_LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - PAPER_RADAR_EMBED_PROVIDER=local
      - PAPER_RADAR_EMBED_MODEL=/mnt/f/AIModels/bge-small-zh-v1.5
      - PAPER_RADAR_EMBED_DEVICE=cpu
    depends_on:
      - paper_radar
      - chroma
    restart: unless-stopped

  astrbot:
    build:
      context: .
      dockerfile: Dockerfile.astrbot
    image: ai_workspace-astrbot
    container_name: ai_astrbot
    ports:
      - "6185:6185"
    volumes:
      - astrbot_data:/AstrBot/data
      - /mnt/f:/mnt/f:ro
      - /mnt/f/AIWorkspace/input:/workspace/input
      - /mnt/f/AIWorkspace/uploads:/workspace/uploads
      - /mnt/f/AIWorkspace/processed:/workspace/processed
      - /mnt/f/AIWorkspace/notes:/workspace/notes
      - /mnt/f/AIWorkspace/repos/allowed:/workspace/repos/allowed
      - /mnt/f/AIWorkspace/tasks:/workspace/tasks
      - /mnt/f/ObsidianVault/AI:/workspace/obsidian_ai
    environment:
      - AI_WORKSPACE_API_BASE=http://host.docker.internal:8001
      - PAPER_RADAR_API_BASE=http://paper_radar:8010
      - PAPER_RADAR_TIMEZONE=Asia/Shanghai
      - PAPER_RADAR_SUBSCRIPTIONS=/AstrBot/data/paper_radar_subscriptions.json
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - paper_radar
    restart: unless-stopped

volumes:
  astrbot_data:
    external: true
    name: ai_workspace_astrbot_data
  paper_radar_data:
  paper_radar_notes:
